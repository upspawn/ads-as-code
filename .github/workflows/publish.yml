name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Skip `npm install -g npm@latest` — it fails on Node 22 because
      # current npm versions can't cleanly self-upgrade over the bundled npm
      # (MODULE_NOT_FOUND on `promise-retry` from arborist). The npm bundled
      # with Node 22 is already 10.x+, which supports `--provenance`.
      - name: Set version from release tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - run: bun install
      - run: bun run build
      - run: npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: "true"
