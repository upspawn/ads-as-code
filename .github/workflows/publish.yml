name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # npm Trusted Publisher OIDC token exchange needs npm >= 11.5.1.
      # Node 22's bundled npm is 10.x, which falls back to NODE_AUTH_TOKEN
      # (rejected by the registry as a 404 on PUT once trusted publishing
      # is enabled). Pin to a known-good npm 11.x — `npm@latest` currently
      # resolves to npm 12.x which fails to overlay on npm 10
      # (MODULE_NOT_FOUND: promise-retry from arborist).
      - run: npm install -g npm@11
      - name: Set version from release tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - run: bun install
      - run: bun run build
      - run: npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: "true"
