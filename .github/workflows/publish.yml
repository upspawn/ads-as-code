name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x, which is required for npm Trusted
          # Publisher OIDC (>= 11.5.1). On Node 22 (bundled npm 10) Trusted
          # Publisher fails over to NODE_AUTH_TOKEN and the registry rejects
          # the publish with a misleading 404 PUT. We can't `npm install -g`
          # to upgrade in-place either — both npm 11 and npm 12 trip
          # `MODULE_NOT_FOUND: promise-retry` in arborist when overlaying
          # onto npm 10. Cleanest path: ship a Node version that already
          # has the right npm bundled.
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Set version from release tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - run: bun install
      - run: bun run build
      - run: npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: "true"
